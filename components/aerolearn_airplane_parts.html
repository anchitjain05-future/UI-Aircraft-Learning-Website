
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; }
  #wrap {
    background: #0d1b2a;
    border-radius: 16px;
    padding: 28px 24px 24px;
    font-family: var(--font-sans, sans-serif);
    min-height: 520px;
    position: relative;
  }
  #title-bar {
    text-align: center;
    margin-bottom: 18px;
  }
  #title-bar h2 {
    color: #fff;
    font-size: 17px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  #title-bar p {
    color: #7a9bb5;
    font-size: 12px;
    margin-top: 4px;
  }
  #stage {
    position: relative;
    width: 100%;
  }
  #part-desc {
    min-height: 72px;
    background: #112233;
    border: 1px solid #1a3a55;
    border-radius: 10px;
    padding: 14px 18px;
    margin-top: 18px;
    transition: opacity 0.4s;
  }
  #part-desc h3 {
    color: #00e5ff;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 5px;
  }
  #part-desc p {
    color: #a8c8e0;
    font-size: 12px;
    line-height: 1.6;
  }
  #progress {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 14px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #1a3a55;
    transition: background 0.3s;
  }
  .dot.active { background: #00e5ff; }
  .dot.done { background: #0099aa; }
  #nav {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 14px;
  }
  #nav button {
    background: #112233;
    border: 1px solid #1a3a55;
    color: #a8c8e0;
    border-radius: 8px;
    padding: 7px 18px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
  }
  #nav button:hover { background: #1a3a55; color: #fff; }
  #nav button.primary {
    background: #00e5ff22;
    border-color: #00e5ff88;
    color: #00e5ff;
  }
  #nav button.primary:hover { background: #00e5ff33; }
  .plane-part {
    transition: filter 0.35s, opacity 0.35s;
    cursor: pointer;
  }
  .plane-part.dim { opacity: 0.18; filter: none; }
  .plane-part.highlight { opacity: 1; filter: drop-shadow(0 0 7px #00e5ffcc); }
  .plane-part.normal { opacity: 0.55; filter: none; }
  .connector-line { transition: opacity 0.4s; }
  .label-group { transition: opacity 0.4s; cursor: pointer; }
</style>

<div id="wrap">
  <div id="title-bar">
    <h2>Parts of an Airplane</h2>
    <p>Click a part or use the buttons to explore</p>
  </div>

  <div id="stage">
    <svg id="plane-svg" width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr-c" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>

      <!-- === FUSELAGE === -->
      <g id="part-fuselage" class="plane-part normal" onclick="selectPart(0)">
        <ellipse cx="310" cy="158" rx="165" ry="26" fill="#1e3a5a" stroke="#2a5a8a" stroke-width="1.2"/>
        <ellipse cx="460" cy="158" rx="18" ry="14" fill="#254a70" stroke="#2a5a8a" stroke-width="1"/>
        <ellipse cx="148" cy="158" rx="14" ry="10" fill="#1a3050" stroke="#2a5a8a" stroke-width="1"/>
        <rect x="148" y="148" width="312" height="20" fill="#1e3a5a"/>
        <path d="M148 148 Q160 138 200 136 L420 136 Q450 136 460 144 L460 172 Q450 180 420 180 L200 180 Q160 178 148 168 Z" fill="#1e3a5a" stroke="#2a5a8a" stroke-width="1.2"/>
        <ellipse cx="460" cy="158" rx="18" ry="22" fill="#254a70" stroke="#2a5a8a" stroke-width="1"/>
        <path d="M455 136 Q475 140 478 158 Q475 176 455 180" fill="#254a70" stroke="#2a5a8a" stroke-width="1" fill-rule="evenodd"/>
      </g>

      <!-- === WINGS === -->
      <g id="part-wings" class="plane-part normal" onclick="selectPart(1)">
        <polygon points="280,158 340,158 360,110 320,110" fill="#163050" stroke="#2a5a8a" stroke-width="1.2"/>
        <polygon points="290,160 350,160 370,210 330,210" fill="#163050" stroke="#2a5a8a" stroke-width="1.2"/>
        <!-- wing tip detail -->
        <line x1="360" y1="110" x2="318" y2="113" stroke="#2a5a8a" stroke-width="0.6" stroke-dasharray="3 2"/>
        <line x1="370" y1="210" x2="328" y2="207" stroke="#2a5a8a" stroke-width="0.6" stroke-dasharray="3 2"/>
      </g>

      <!-- === TAIL (EMPENNAGE) === -->
      <g id="part-tail" class="plane-part normal" onclick="selectPart(2)">
        <!-- vertical stabilizer -->
        <polygon points="158,158 165,158 175,130 155,132" fill="#163050" stroke="#2a5a8a" stroke-width="1.2"/>
        <!-- horizontal stabilizers -->
        <polygon points="148,155 180,155 192,140 165,140" fill="#163050" stroke="#2a5a8a" stroke-width="1.2"/>
        <polygon points="148,162 180,162 192,175 165,175" fill="#163050" stroke="#2a5a8a" stroke-width="1.2"/>
      </g>

      <!-- === POWERPLANT (ENGINE) === -->
      <g id="part-powerplant" class="plane-part normal" onclick="selectPart(3)">
        <!-- engine pod under right wing -->
        <ellipse cx="330" cy="125" rx="20" ry="7" fill="#1a3555" stroke="#2a5a8a" stroke-width="1.2"/>
        <rect x="310" y="118" width="40" height="14" rx="3" fill="#1a3555" stroke="#2a5a8a" stroke-width="1.2"/>
        <ellipse cx="310" cy="125" rx="8" ry="7" fill="#0d2040" stroke="#2a5a8a" stroke-width="1.2"/>
        <!-- nacelle -->
        <ellipse cx="350" cy="125" rx="5" ry="6" fill="#254a70" stroke="#2a5a8a" stroke-width="1"/>
        <!-- engine pod lower wing -->
        <ellipse cx="330" cy="193" rx="20" ry="7" fill="#1a3555" stroke="#2a5a8a" stroke-width="1.2"/>
        <rect x="310" y="186" width="40" height="14" rx="3" fill="#1a3555" stroke="#2a5a8a" stroke-width="1.2"/>
        <ellipse cx="310" cy="193" rx="8" ry="7" fill="#0d2040" stroke="#2a5a8a" stroke-width="1.2"/>
        <ellipse cx="350" cy="193" rx="5" ry="6" fill="#254a70" stroke="#2a5a8a" stroke-width="1"/>
      </g>

      <!-- === LANDING GEAR === -->
      <g id="part-landinggear" class="plane-part normal" onclick="selectPart(4)">
        <!-- main gear -->
        <line x1="300" y1="178" x2="298" y2="210" stroke="#2a5a8a" stroke-width="2.5" stroke-linecap="round"/>
        <ellipse cx="298" cy="213" rx="10" ry="5" fill="#1a3050" stroke="#2a5a8a" stroke-width="1.5"/>
        <line x1="340" y1="178" x2="342" y2="210" stroke="#2a5a8a" stroke-width="2.5" stroke-linecap="round"/>
        <ellipse cx="342" cy="213" rx="10" ry="5" fill="#1a3050" stroke="#2a5a8a" stroke-width="1.5"/>
        <!-- nose gear -->
        <line x1="420" y1="178" x2="420" y2="204" stroke="#2a5a8a" stroke-width="2" stroke-linecap="round"/>
        <ellipse cx="420" cy="207" rx="7" ry="4" fill="#1a3050" stroke="#2a5a8a" stroke-width="1.2"/>
      </g>

      <!-- === CONNECTOR LINES (hidden until active) === -->
      <!-- Fuselage -->
      <line id="line-0" class="connector-line" x1="310" y1="140" x2="310" y2="72" stroke="#00e5ff" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-c)" opacity="0"/>
      <!-- Wings -->
      <line id="line-1" class="connector-line" x1="355" y1="125" x2="490" y2="80" stroke="#00e5ff" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-c)" opacity="0"/>
      <!-- Tail -->
      <line id="line-2" class="connector-line" x1="168" y1="148" x2="90" y2="90" stroke="#00e5ff" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-c)" opacity="0"/>
      <!-- Powerplant -->
      <line id="line-3" class="connector-line" x1="352" y1="120" x2="490" y2="40" stroke="#00e5ff" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-c)" opacity="0"/>
      <!-- Landing gear -->
      <line id="line-4" class="connector-line" x1="320" y1="215" x2="310" y2="265" stroke="#00e5ff" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-c)" opacity="0"/>

      <!-- === FLOATING LABELS === -->
      <!-- Fuselage label (top center) -->
      <g id="lbl-0" class="label-group" opacity="0" onclick="selectPart(0)">
        <rect x="255" y="50" width="110" height="24" rx="6" fill="#00e5ff22" stroke="#00e5ff66" stroke-width="1"/>
        <text x="310" y="66" text-anchor="middle" font-size="12" font-weight="500" fill="#00e5ff" font-family="var(--font-sans,sans-serif)">Fuselage</text>
      </g>
      <!-- Wings label (top right) -->
      <g id="lbl-1" class="label-group" opacity="0" onclick="selectPart(1)">
        <rect x="490" y="60" width="80" height="24" rx="6" fill="#00e5ff22" stroke="#00e5ff66" stroke-width="1"/>
        <text x="530" y="76" text-anchor="middle" font-size="12" font-weight="500" fill="#00e5ff" font-family="var(--font-sans,sans-serif)">Wings</text>
      </g>
      <!-- Tail label (top left) -->
      <g id="lbl-2" class="label-group" opacity="0" onclick="selectPart(2)">
        <rect x="30" y="68" width="120" height="24" rx="6" fill="#00e5ff22" stroke="#00e5ff66" stroke-width="1"/>
        <text x="90" y="84" text-anchor="middle" font-size="12" font-weight="500" fill="#00e5ff" font-family="var(--font-sans,sans-serif)">Empennage (Tail)</text>
      </g>
      <!-- Powerplant label -->
      <g id="lbl-3" class="label-group" opacity="0" onclick="selectPart(3)">
        <rect x="488" y="22" width="90" height="24" rx="6" fill="#00e5ff22" stroke="#00e5ff66" stroke-width="1"/>
        <text x="533" y="38" text-anchor="middle" font-size="12" font-weight="500" fill="#00e5ff" font-family="var(--font-sans,sans-serif)">Powerplant</text>
      </g>
      <!-- Landing gear label -->
      <g id="lbl-4" class="label-group" opacity="0" onclick="selectPart(4)">
        <rect x="248" y="248" width="120" height="24" rx="6" fill="#00e5ff22" stroke="#00e5ff66" stroke-width="1"/>
        <text x="308" y="264" text-anchor="middle" font-size="12" font-weight="500" fill="#00e5ff" font-family="var(--font-sans,sans-serif)">Landing Gear</text>
      </g>
    </svg>
  </div>

  <div id="part-desc">
    <h3 id="desc-title">Select a part to learn more</h3>
    <p id="desc-text">Click any highlighted section on the aircraft above, or use the buttons below to explore each component.</p>
  </div>

  <div id="progress">
    <div class="dot" id="dot-0"></div>
    <div class="dot" id="dot-1"></div>
    <div class="dot" id="dot-2"></div>
    <div class="dot" id="dot-3"></div>
    <div class="dot" id="dot-4"></div>
  </div>

  <div id="nav">
    <button onclick="prevPart()">← Prev</button>
    <button class="primary" onclick="nextPart()">Next →</button>
  </div>
</div>

<script>
const parts = [
  {
    id: 'fuselage',
    name: 'Fuselage',
    desc: 'The main body of the aircraft. Designed to be highly aerodynamic, it houses the cockpit, passenger cabin, and cargo. Its streamlined shape minimizes drag while maintaining structural integrity under intense pressure changes.',
    svgId: 'part-fuselage',
    lineId: 'line-0',
    lblId: 'lbl-0'
  },
  {
    id: 'wings',
    name: 'Wings',
    desc: 'The primary lift-generating surfaces. They use an airfoil cross-section to create a pressure difference — lower pressure above, higher pressure below — producing the upward lift force that keeps the aircraft airborne.',
    svgId: 'part-wings',
    lineId: 'line-1',
    lblId: 'lbl-1'
  },
  {
    id: 'tail',
    name: 'Empennage (Tail)',
    desc: 'Provides critical stability and control. The vertical stabilizer prevents side-to-side yaw, while the horizontal stabilizer prevents nose-up/nose-down pitch. Control surfaces here are operated by the pilot to steer the aircraft.',
    svgId: 'part-tail',
    lineId: 'line-2',
    lblId: 'lbl-2'
  },
  {
    id: 'powerplant',
    name: 'Powerplant',
    desc: 'The propulsion system of the aircraft. Jet engines housed in nacelles burn fuel to generate massive thrust, overcoming drag and accelerating the aircraft forward. Most commercial aircraft have two or four engines.',
    svgId: 'part-powerplant',
    lineId: 'line-3',
    lblId: 'lbl-3'
  },
  {
    id: 'landinggear',
    name: 'Landing Gear',
    desc: 'The shock-absorbing wheel assembly that supports the aircraft on the ground. It enables safe taxiing, takeoff, and landing. During flight, most modern aircraft retract the gear into the fuselage to significantly reduce drag.',
    svgId: 'part-landinggear',
    lineId: 'line-4',
    lblId: 'lbl-4'
  }
];

let current = -1;
let seen = new Set();

function selectPart(idx) {
  current = idx;
  seen.add(idx);

  parts.forEach((p, i) => {
    const el = document.getElementById(p.svgId);
    const line = document.getElementById(p.lineId);
    const lbl = document.getElementById(p.lblId);
    if (i === idx) {
      el.className.baseVal = 'plane-part highlight';
      line.setAttribute('opacity', '1');
      lbl.setAttribute('opacity', '1');
    } else {
      el.className.baseVal = 'plane-part dim';
      line.setAttribute('opacity', '0');
      lbl.setAttribute('opacity', '0');
    }
    const dot = document.getElementById('dot-' + i);
    dot.className = 'dot' + (i === idx ? ' active' : (seen.has(i) ? ' done' : ''));
  });

  document.getElementById('desc-title').textContent = parts[idx].name;
  document.getElementById('desc-text').textContent = parts[idx].desc;
}

function nextPart() {
  const next = (current + 1) % parts.length;
  selectPart(next);
}

function prevPart() {
  const prev = (current - 1 + parts.length) % parts.length;
  selectPart(prev);
}

selectPart(0);
</script>
